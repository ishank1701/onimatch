<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>ONIMATCH</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-row">
                <button class="home-btn" id="btn-home">Home</button>button>
                <div class="hero-logo"><img src="logo.png" alt="ONIMATCH" class="hero-img"></div>div>
            </div>div>
        </header>header>
        <section class="home-section" id="home-section">
            <div class="home-cta">
                <h2 class="home-cta-title" style="color:white">Find Your Perfect Anime</h2>h2>
                <div class="home-cta-buttons">
                    <button class="btn-cta-quiz" id="btn-cta-quiz">Take the Quiz</button>button>
                    <button class="btn-cta-similar" id="btn-cta-similar">Find Similar</button>button>
                </div>div>
            </div>div>
            <div class="home-row"><div class="home-scroll" id="home-top-anime"></div>div></div>div>
            <div class="home-row"><div class="home-scroll" id="home-airing"></div>div></div>div>
            <div class="home-row"><div class="home-scroll" id="home-upcoming"></div>div></div>div>
            <div class="studio-grid" id="studio-grid"></div>div>
        </section>section>
        <div class="tab-bar hidden" id="tab-bar">
            <button class="tab-btn active" data-tab="quiz" id="tab-quiz">Quiz</button>button>
            <button class="tab-btn" data-tab="similar" id="tab-similar">Similar</button>button>
        </div>div>
        <div class="section-panel" id="section-quiz">
            <div class="progress-fill" id="progress-fill"></div>div>
            <div id="quiz-container"><div id="quiz-step"></div>div><button id="btn-back" class="hidden">Back</button>button><button id="btn-next" disabled>Next</button>button></div>div>
        </div>div>
        <div class="section-panel" id="section-similar">
            <input type="text" id="anime-search-input" placeholder="Search..."><div id="autocomplete-dropdown" class="hidden"></div>div>
            <button id="btn-find-similar" disabled>Find Similar</button>button>
        </div>div>
        <div id="loading-container" class="hidden">Loading...</div>div>
        <div id="results-container" class="hidden"></div>div>
    </div>div>
    <div class="robot-container" id="robot-container">
        <div class="robot-eyes"><div class="robot-eye" id="eye-left"><div class="robot-pupil" id="pupil-left"></div>div></div>div><div class="robot-eye" id="eye-right"><div class="robot-pupil" id="pupil-right"></div>div></div>div></div>div>
        <div class="robot-speech" id="speech-bubble"><span id="speech-text">Hey!</span>span></div>div>
    </div>div>
    <script src="app.js"></script>
</body>
</html>
</body></title>
    </head>
</html>
